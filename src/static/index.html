<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Animated Git-style branch background -->
    <canvas id="git-branches-canvas"></canvas>

    <header>
      <div class="header-mascots">
        <img src="https://octodex.github.com/images/original.png" alt="Octocat mascot" class="mascot-img" title="Original Octocat" />
        <img src="https://octodex.github.com/images/class-act.png" alt="Class Act Octocat" class="mascot-img" title="Class Act" />
        <img src="https://octodex.github.com/images/collabocats.png" alt="Collabocats" class="mascot-img" title="Collabocats" />
        <img src="https://octodex.github.com/images/sportocatocat.png" alt="Sport Octocat" class="mascot-img" title="Sportocatocat" />
      </div>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
      <div id="user-controls">
        <div id="user-status">
          <button id="login-button" class="icon-button">
            <span class="user-icon">👤</span>
            <span>Login</span>
          </button>
          <div id="user-info" class="hidden">
            <span id="display-name"></span>
            <button id="logout-button">Logout</button>
          </div>
        </div>
      </div>
    </header>

    <main>
      <section id="activities-container">
        <div class="main-content-layout">
          <!-- Left Sidebar for Filters -->
          <aside class="sidebar-filters">
            <h3>Filter Activities</h3>
            <!-- Search Box -->
            <div class="search-box">
              <input
                type="text"
                id="activity-search"
                placeholder="Search activities..."
              />
              <button id="search-button" aria-label="Search">
                <span class="search-icon">🔍</span>
              </button>
            </div>

            <div class="filter-container">
              <div class="filter-label">Filter by category:</div>
              <div class="category-filters" id="category-filters">
                <button class="category-filter active" data-category="all">
                  All
                </button>
                <button class="category-filter" data-category="sports">
                  Sports
                </button>
                <button class="category-filter" data-category="arts">
                  Arts
                </button>
                <button class="category-filter" data-category="academic">
                  Academic
                </button>
                <button class="category-filter" data-category="community">
                  Community
                </button>
                <button class="category-filter" data-category="technology">
                  Technology
                </button>
              </div>
            </div>

            <!-- Day Filter -->
            <div class="filter-container day-filter-container">
              <div class="filter-label">Filter by day:</div>
              <div class="day-filters" id="day-filters">
                <button class="day-filter active" data-day="">All Days</button>
                <button class="day-filter" data-day="Monday">Monday</button>
                <button class="day-filter" data-day="Tuesday">Tuesday</button>
                <button class="day-filter" data-day="Wednesday">
                  Wednesday
                </button>
                <button class="day-filter" data-day="Thursday">Thursday</button>
                <button class="day-filter" data-day="Friday">Friday</button>
                <button class="day-filter" data-day="Saturday">Saturday</button>
                <button class="day-filter" data-day="Sunday">Sunday</button>
              </div>
            </div>

            <!-- Time Filter -->
            <div class="filter-container time-filter-container">
              <div class="filter-label">Filter by time:</div>
              <div class="time-filters">
                <button class="time-filter active" data-time="">
                  All Times
                </button>
                <button class="time-filter" data-time="morning">
                  Before School
                </button>
                <button class="time-filter" data-time="afternoon">
                  After School
                </button>
                <button class="time-filter" data-time="weekend">Weekend</button>
              </div>
            </div>
          </aside>

          <!-- Activities Content -->
          <div class="activities-content">
            <div id="activities-list">
              <!-- Activities will be loaded here -->
              <p>Loading activities...</p>
            </div>
            <div id="message" class="hidden message"></div>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <p>&copy; 2023 Mergington High School</p>
    </footer>

    <!-- Registration Modal -->
    <div id="registration-modal" class="modal hidden">
      <div class="modal-content">
        <span class="close-modal">&times;</span>
        <h3>Register for <span id="modal-activity-name"></span></h3>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input
              type="email"
              id="email"
              required
              placeholder="your-email@mergington.edu"
            />
          </div>
          <input type="hidden" id="activity" value="" />
          <button type="submit">Register</button>
        </form>
      </div>
    </div>

    <!-- Login Modal -->
    <div id="login-modal" class="modal hidden">
      <div class="modal-content">
        <span class="close-login-modal">&times;</span>
        <h3>Teacher Login</h3>
        <form id="login-form">
          <div class="form-group">
            <label for="username">Username:</label>
            <input
              type="text"
              id="username"
              required
              placeholder="Enter your username"
            />
          </div>
          <div class="form-group">
            <label for="password">Password:</label>
            <input
              type="password"
              id="password"
              required
              placeholder="Enter your password"
            />
          </div>
          <button type="submit">Login</button>
        </form>
        <div id="login-message" class="hidden message"></div>
      </div>
    </div>

    <script src="app.js"></script>
    <script>
      // Animated Git-style branch lines background
      (function () {
        const canvas = document.getElementById("git-branches-canvas");
        const ctx = canvas.getContext("2d");

        const COLORS = ["#5a9e1b", "#78c832", "#3d6e12", "#a8d660", "#2e5c0e"];
        const NODE_RADIUS = 5;
        const BRANCH_COUNT = 5;
        const SPEED = 0.4;

        let branches = [];
        let animFrame;

        function resize() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        }

        function randomColor() {
          return COLORS[Math.floor(Math.random() * COLORS.length)];
        }

        function createBranch(x, y, angle, depth) {
          return {
            x,
            y,
            angle,
            depth,
            progress: 0,
            length: 80 + Math.random() * 120,
            color: randomColor(),
            lineWidth: Math.max(1, 3 - depth * 0.6),
            speed: SPEED * (0.5 + Math.random() * 0.8),
            nodes: [{ x, y }],
            children: [],
            spawned: false,
          };
        }

        function initBranches() {
          branches = [];
          for (let i = 0; i < BRANCH_COUNT; i++) {
            const x = (canvas.width / (BRANCH_COUNT + 1)) * (i + 1);
            const y = -20;
            branches.push(createBranch(x, y, Math.PI / 2, 0));
          }
        }

        function updateBranch(branch) {
          if (branch.progress < branch.length) {
            branch.progress += branch.speed;
            const t = branch.progress / branch.length;
            const nx = branch.x + Math.cos(branch.angle) * branch.progress;
            const ny = branch.y + Math.sin(branch.angle) * branch.progress;
            branch.nodes.push({ x: nx, y: ny });

            // Spawn child branches at midpoint if not yet spawned
            if (!branch.spawned && t > 0.4 + Math.random() * 0.3 && branch.depth < 3) {
              branch.spawned = true;
              const spread = (Math.PI / 8) + Math.random() * (Math.PI / 8);
              branch.children.push(
                createBranch(nx, ny, branch.angle - spread, branch.depth + 1)
              );
              if (Math.random() > 0.4) {
                branch.children.push(
                  createBranch(nx, ny, branch.angle + spread, branch.depth + 1)
                );
              }
            }
          }

          branch.children.forEach(updateBranch);

          // Reset branch when it goes off-screen
          const tip = branch.nodes[branch.nodes.length - 1];
          if (tip && tip.y > canvas.height + 40) {
            const startX = 50 + Math.random() * (canvas.width - 100);
            Object.assign(branch, createBranch(startX, -20, Math.PI / 2 + (Math.random() - 0.5) * 0.4, 0));
          }
        }

        function drawBranch(branch) {
          if (branch.nodes.length < 2) return;

          ctx.beginPath();
          ctx.strokeStyle = branch.color;
          ctx.lineWidth = branch.lineWidth;
          ctx.lineJoin = "round";
          ctx.lineCap = "round";

          ctx.moveTo(branch.nodes[0].x, branch.nodes[0].y);
          for (let i = 1; i < branch.nodes.length; i++) {
            ctx.lineTo(branch.nodes[i].x, branch.nodes[i].y);
          }
          ctx.stroke();

          // Draw nodes (commit dots)
          branch.nodes.forEach((node, i) => {
            if (i % 30 === 0 && i > 0) {
              ctx.beginPath();
              ctx.arc(node.x, node.y, NODE_RADIUS, 0, Math.PI * 2);
              ctx.fillStyle = branch.color;
              ctx.fill();
              ctx.beginPath();
              ctx.arc(node.x, node.y, NODE_RADIUS - 2, 0, Math.PI * 2);
              ctx.fillStyle = "#ffffff";
              ctx.fill();
            }
          });

          branch.children.forEach(drawBranch);
        }

        function animate() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          branches.forEach(updateBranch);
          branches.forEach(drawBranch);
          animFrame = requestAnimationFrame(animate);
        }

        window.addEventListener("resize", () => {
          resize();
          initBranches();
        });

        resize();
        initBranches();
        animate();
      })();
    </script>
  </body>
</html>
